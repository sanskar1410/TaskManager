spring.application.name=team-task-manager

# --- Database (Railway MySQL) ---
# Railway's MySQL plugin exposes host/port/user/password/database as env vars.
# Check your Railway MySQL service's "Variables" tab for exact names if these don't match.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:taskmanager}?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# IMPORTANT: override jwt.secret via a Railway env var in production.
# Must be at least 32 characters for HS256.
jwt.secret=${JWT_SECRET:this-is-a-local-dev-only-secret-replace-in-production-min-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- CORS ---
# Comma-separated list. Add your Vercel URL here (or via Railway env var) once deployed.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Server ---
server.port=${PORT:8080}
